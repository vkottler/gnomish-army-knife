  R2_2: s "Hand of Gul'dan"

  L1_T_1: m scfl
  L1_T_2: s "Call Fel Lord"

  L1_C_1: s "Summon Demonic Tyrant"
  L1_C_2: s "Summon Demonic Tyrant"

  C_1: 's "Grimoire: Felguard"'
