nameplateLargerScale: 1.2
# NamePlateHorizontalScale: 0.5
# NamePlateVerticalScale: 1
# nameplateSelectedScale: 1.2

nameplateMinScale: 0.9
nameplateMaxScale: 0.9

showPartyPets: 1
raidOptionDisplayPets: 1

nameplateShowFriendlyPlayerTotems: 0

SoftTargetNameplateFriend: 0

nameplateOverlapH: 0.6
nameplateOverlapV: 0.6

cooldownViewerEnabled: 1
assistedCombatHighlight: 1

# 'basic' https://wowpedia.fandom.com/wiki/CVar_ActionCam
test_cameraDynamicPitch: 1
test_cameraHeadMovementStrength: 0
test_cameraOverShoulder: 0
test_cameraTargetFocusInteractEnable: 0
test_cameraTargetFocusEnemyEnable: 0
CameraKeepCharacterCentered: 0

cameraDistanceMaxZoomFactor: 2.6
cameraFov: 90

rotateMinimap: 0

ReplaceMyPlayerPortrait: 1
ReplaceOtherPlayerPortraits: 1

noBuffDebuffFilterOnTarget: 1

# midnight stuff
damageMeterEnabled: 0  # not many features yet, off by default
externalDefensivesEnabled: 1
lootUnderMouse: 0
showTargetOfTarget: 1
spellDiminishPVPOnlyTriggerableByMe: 1
secretPvPMatchRestrictionsForced: 1
nameplateSize: 5
nameplateStyle: 4
nameplateAuraScale: 0.7
pvpFramesDisplayOnlyHealerPowerBars: 1
raidFramesDisplayOnlyHealerPowerBars: 1
pvpOptionDisplayPets: 1
nameplateShowOffscreen: 1

synchronizeConfig: 0

# graphics
RAIDsettingsEnabled: 0
# graphicsViewDistance: 0
graphicsSpellDensity: 2
graphicsProjectedTextures: 1
useTargetFPS: 0
useMaxFPS: 0
